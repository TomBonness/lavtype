name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  SHERPA_ONNX_VERSION: 1.13.4

jobs:
  package:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-14
            platform: macos
            arch: arm64
          - name: macos-x86_64
            runner: macos-14
            platform: macos
            arch: x86_64
          - name: linux-x86_64
            runner: ubuntu-22.04
            platform: linux
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_CERTIFICATE_P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_B64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            cmake pkg-config libgtk-3-dev libayatana-appindicator3-dev \
            libasound2-dev libxkbcommon-dev libxkbcommon-x11-dev libfuse2
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.92.0
      - name: Build package
        run: ./scripts/release.sh "${{ matrix.platform }}" "${{ matrix.arch }}"
      - name: Import optional Apple signing certificate
        if: matrix.platform == 'macos' && env.APPLE_CERTIFICATE_P12_B64 != ''
        env:
          APPLE_CERTIFICATE_P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_B64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/lavtype-signing.keychain-db"
          security create-keychain -p "$RUNNER_TEMP" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$RUNNER_TEMP" "$keychain"
          printf '%s' "$APPLE_CERTIFICATE_P12_B64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$keychain"
      - name: Conditionally sign, notarize, and staple macOS DMG
        if: matrix.platform == 'macos' && env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          for dmg in dist/*.dmg; do
            [ -f "$dmg" ] || continue
            ./scripts/sign-macos-dmg.sh "$dmg"
          done
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish release
    needs: package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Build source archive and checksums
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mkdir -p release-assets
          git archive --format=tar.gz --prefix="lavtype-${tag#v}/" "$tag" > "release-assets/lavtype-${tag#v}-source.tar.gz"
          (cd release-assets && sha256sum -- * > SHA256SUMS)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --verify-tag --generate-notes --title "Lavtype $GITHUB_REF_NAME"
